<!DOCTYPE html>
<html>
<head>
    <title>Placement Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 Placement Predictor</h2>

    <input type="number" id="cgpa" placeholder="Enter CGPA" step="0.1">
    <input type="number" id="skills" placeholder="Skills (1-5)">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function predict() {
    const cgpa = document.getElementById("cgpa").value;
    const skills = document.getElementById("skills").value;

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            cgpa: cgpa,
            skills: skills
        })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        "Result: " + data.message;
}
</script>

</body>
</html>
